name: Build and deploy Docker container to Azure Web App - trolley-for-tomorrow-api

on:
  push:
    branches:
      - production
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/dehydrated-sushi/trolley-for-tomorrow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1EB43F366E9745C591518922AC5FF646 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_56AEE9CB5DFE4BDE94EC064BE7BCC261 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D22DE5B6EED7496094CB1FC3F0560C00 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'trolley-for-tomorrow-api'
          slot-name: 'Production'
          images: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
