
services:
  # ── React + Vite
  - type: web
    name: nutriplan-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - frontend/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Flask API ──
  - type: web
    name: nutriplan-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 "app:create_app()"
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRES_MINUTES
        value: "30"
     
      - key: DATABASE_URL
        sync: false

      - key: CORS_ORIGINS
        sync: false
